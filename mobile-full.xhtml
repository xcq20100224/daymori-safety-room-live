<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="zh-CN" lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <title>安全屋场景 Full Mobile</title>
  <link rel="preload" as="image" href="menu-main-exact.png" />
  <link rel="preload" as="image" href="menu-animatronics-latest.png" />
  <link rel="preload" as="image" href="assets/safety-room-mobile.jpg" />
  <style type="text/css"><![CDATA[
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: #050505;
      color: rgba(248, 250, 250, 0.94);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .game-stage,
    .main-menu,
    .intro-screen,
    .tablet {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .game-stage {
      z-index: 1;
      background: #000;
    }

    .room {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: 50% 50%;
      filter: grayscale(1) contrast(1.12) brightness(0.86);
      animation: room-breathe 3.2s ease-in-out infinite;
    }

    .shade,
    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .shade {
      background:
        radial-gradient(ellipse at 50% 48%, rgba(0, 0, 0, 0) 0 48%, rgba(0, 0, 0, 0.34) 100%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.42));
      mix-blend-mode: multiply;
    }

    .grain,
    .menu-noise {
      opacity: 0.16;
      background-image: repeating-linear-gradient(to bottom, rgba(255, 255, 255, 0.08) 0 1px, rgba(0, 0, 0, 0) 1px 4px);
    }

    .main-menu {
      z-index: 60;
      display: block;
      background: #020201;
      isolation: isolate;
      transition: opacity 260ms linear, visibility 260ms linear;
    }

    body:not(.main-menu-open) .main-menu {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .menu-background {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: url("menu-main-exact.png") center center / cover no-repeat;
      filter: brightness(1) contrast(1.02);
      animation: menu-plate-filter-breathe 11.4s ease-in-out infinite;
      --menu-left-width: min(39vw, calc(100vh * 0.74));
    }

    .menu-background::before,
    .menu-background::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .menu-background::before {
      z-index: 24;
      background:
        repeating-linear-gradient(to bottom, rgba(225, 214, 196, 0.038) 0 1px, rgba(0, 0, 0, 0.18) 1px 3px, rgba(0, 0, 0, 0) 3px 5px),
        linear-gradient(to bottom, rgba(255, 232, 192, 0.015), rgba(0, 0, 0, 0.28));
      opacity: 0.34;
      mix-blend-mode: screen;
      animation: menu-vhs-scan 150ms steps(2, end) infinite;
    }

    .menu-background::after {
      z-index: 23;
      background:
        radial-gradient(circle at 18% 28%, rgba(227, 214, 196, 0.12) 0 0.7px, rgba(0, 0, 0, 0) 1.2px),
        radial-gradient(circle at 72% 64%, rgba(201, 187, 166, 0.08) 0 0.8px, rgba(0, 0, 0, 0) 1.3px),
        radial-gradient(ellipse at 68% 45%, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.06) 52%, rgba(0, 0, 0, 0.54) 100%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.22));
      background-size: 3px 3px, 5px 5px, auto, auto;
      opacity: 0.52;
      mix-blend-mode: screen;
      animation: menu-grain-drift 7.5s linear infinite;
    }

    .menu-left-plate {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 4;
      width: var(--menu-left-width);
      background: url("menu-main-exact.png") left center / auto 100% no-repeat;
      -webkit-mask-image: linear-gradient(to right, #000 0%, #000 88%, rgba(0, 0, 0, 0.86) 94%, rgba(0, 0, 0, 0) 100%);
      mask-image: linear-gradient(to right, #000 0%, #000 88%, rgba(0, 0, 0, 0.86) 94%, rgba(0, 0, 0, 0) 100%);
    }

    .menu-left-plate::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: url("menu-main-exact.png") left center / auto 100% no-repeat;
      mix-blend-mode: screen;
      opacity: 0.36;
      filter: brightness(1.05) contrast(1.14) saturate(1.08);
      -webkit-mask-image: radial-gradient(ellipse 27% 13% at 61% 6%, #000 0%, #000 38%, rgba(0, 0, 0, 0.62) 54%, rgba(0, 0, 0, 0) 78%);
      mask-image: radial-gradient(ellipse 27% 13% at 61% 6%, #000 0%, #000 38%, rgba(0, 0, 0, 0.62) 54%, rgba(0, 0, 0, 0) 78%);
    }

    .menu-scene-bridge {
      position: absolute;
      left: calc(var(--menu-left-width) - 18px);
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 5;
      background:
        radial-gradient(ellipse at 64% 28%, rgba(218, 183, 124, 0.3) 0%, rgba(142, 108, 68, 0.14) 35%, rgba(0, 0, 0, 0) 66%),
        radial-gradient(ellipse at 70% 66%, rgba(154, 134, 96, 0.23) 0%, rgba(0, 0, 0, 0) 50%),
        linear-gradient(90deg, rgba(0, 0, 0, 0) 0%, rgba(12, 9, 7, 0.08) 18%, rgba(7, 6, 5, 0.22) 48%, rgba(1, 1, 1, 0.48) 100%);
      opacity: 0.82;
      filter: brightness(1.55) contrast(1.1) saturate(1.08);
      animation: menu-right-bg-breathe 13.5s ease-in-out infinite;
      pointer-events: none;
    }

    .menu-monster {
      position: absolute;
      left: max(calc(var(--menu-left-width) + 44px), 44.6vw);
      right: -2vw;
      top: 0;
      bottom: 0;
      z-index: 9;
      pointer-events: none;
      background-image: url("menu-animatronics-latest.png");
      background-repeat: no-repeat;
      background-size: auto 154%;
      background-position: 55% 42%;
      opacity: 0.9;
      filter:
        brightness(1.22)
        contrast(1.55)
        saturate(0.9)
        sepia(0.06)
        drop-shadow(-14px 0 24px rgba(0, 0, 0, 0.66))
        drop-shadow(0 0 20px rgba(214, 182, 126, 0.14));
      -webkit-mask-image: radial-gradient(ellipse at 58% 48%, #000 0%, #000 54%, rgba(0, 0, 0, 0.82) 70%, rgba(0, 0, 0, 0) 100%);
      mask-image: radial-gradient(ellipse at 58% 48%, #000 0%, #000 54%, rgba(0, 0, 0, 0.82) 70%, rgba(0, 0, 0, 0) 100%);
      animation: character-breathe 5.8s ease-in-out infinite;
    }

    .menu-hit-zones {
      position: absolute;
      left: clamp(52px, 9.2vw, 132px);
      top: clamp(255px, 62.8vh, 486px);
      width: clamp(150px, 23vw, 300px);
      display: grid;
      gap: clamp(12px, 2.8vh, 24px);
      z-index: 40;
      pointer-events: auto;
    }

    .menu-hit {
      width: 100%;
      min-height: clamp(30px, 7vh, 56px);
      padding: 0;
      border: 0;
      background: transparent;
      color: transparent;
      font-size: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(255, 226, 184, 0.14);
    }

    .menu-hit:active,
    .menu-hit:focus-visible {
      outline: none;
      background: rgba(255, 226, 184, 0.05);
    }

    .menu-debug-label {
      position: absolute;
      left: clamp(18px, 3vw, 28px);
      bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 41;
      color: rgba(224, 207, 180, 0.28);
      font-family: Consolas, "Courier New", monospace;
      font-size: clamp(8px, 1.5vw, 12px);
      letter-spacing: 0.14em;
      pointer-events: none;
    }

    .intro-screen {
      z-index: 55;
      display: grid;
      place-items: center;
      background: #000;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 220ms linear, visibility 220ms linear;
    }

    body.intro-open .intro-screen {
      opacity: 1;
      visibility: visible;
    }

    .intro-line {
      color: rgba(245, 245, 245, 0.96);
      font-family: Consolas, "Courier New", monospace;
      font-size: clamp(24px, 7vw, 64px);
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.18);
    }

    .hud {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(16px, env(safe-area-inset-right));
      z-index: 10;
      display: grid;
      gap: 2px;
      justify-items: end;
      font-family: Consolas, "Courier New", monospace;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.82);
      pointer-events: none;
      transition: opacity 220ms linear;
    }

    body.main-menu-open .hud,
    body.intro-open .hud,
    body.main-menu-open .tablet-button,
    body.intro-open .tablet-button {
      opacity: 0;
      pointer-events: none;
    }

    .hud span {
      font-size: clamp(13px, 2.5vw, 18px);
      font-weight: 800;
      letter-spacing: 0.16em;
    }

    .hud strong {
      font-size: clamp(28px, 7vw, 54px);
      line-height: 0.95;
      letter-spacing: 0.06em;
    }

    #tabletSwitch {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .tablet-button {
      position: fixed;
      left: 50%;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 15;
      display: grid;
      place-items: center;
      width: clamp(128px, 24vw, 210px);
      height: clamp(34px, 6.4vh, 48px);
      transform: translateX(-50%);
      border: 1px solid rgba(244, 246, 246, 0.68);
      border-radius: 6px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.17), rgba(255, 255, 255, 0.025) 35%, rgba(0, 0, 0, 0.82) 100%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.06) 0 1px, rgba(0, 0, 0, 0) 1px 7px),
        #050606;
      color: rgba(248, 250, 250, 0.94);
      font-size: clamp(13px, 2.5vw, 18px);
      font-weight: 800;
      letter-spacing: 0.18em;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.64), 0 0 0 1px rgba(0, 0, 0, 0.84) inset;
    }

    .tablet {
      z-index: 20;
      display: none;
      background: rgba(0, 0, 0, 0.96);
    }

    #tabletSwitch:checked ~ .tablet {
      display: block;
    }

    .tablet-panel {
      position: absolute;
      inset: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      border: 1px solid rgba(246, 248, 248, 0.38);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(0, 0, 0, 0.2) 18%, rgba(0, 0, 0, 0.92) 100%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.025) 0 1px, rgba(0, 0, 0, 0) 1px 11px),
        #020303;
      overflow: hidden;
    }

    .tablet-feed {
      position: absolute;
      inset: 48px 12px 12px 12px;
      border: 1px solid rgba(246, 248, 248, 0.36);
      background: #020202 url("assets/safety-room-mobile.jpg") center center / contain no-repeat;
      filter: grayscale(1) contrast(1.18) brightness(0.78);
    }

    .tablet-title {
      position: absolute;
      left: 16px;
      top: 14px;
      z-index: 2;
      margin: 0;
      font-family: Consolas, "Courier New", monospace;
      font-weight: 800;
      letter-spacing: 0.16em;
      font-size: clamp(12px, 2.3vw, 16px);
    }

    .close {
      position: absolute;
      right: 12px;
      top: 10px;
      z-index: 3;
      display: grid;
      place-items: center;
      min-width: 72px;
      height: 32px;
      border: 1px solid rgba(244, 246, 246, 0.6);
      border-radius: 4px;
      background: #080909;
      color: rgba(248, 250, 250, 0.92);
      font-weight: 800;
    }

    .portrait-lock {
      display: none;
    }

    @media (orientation: portrait) {
      .game-stage,
      .main-menu,
      .intro-screen,
      .tablet-button,
      .hud,
      .tablet {
        display: none !important;
      }

      .portrait-lock {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: grid;
        place-items: center;
        padding: 28px;
        background: #050505;
        text-align: center;
      }

      .portrait-lock strong {
        display: block;
        font-size: clamp(24px, 8vw, 42px);
        letter-spacing: 0.08em;
      }

      .portrait-lock span {
        display: block;
        margin-top: 14px;
        color: rgba(248, 250, 250, 0.66);
        font-size: clamp(14px, 4vw, 22px);
      }
    }

    @media (orientation: landscape) and (max-width: 1180px) {
      .menu-background {
        --menu-left-width: min(39vw, calc(100vh * 0.74));
      }

      .menu-hit-zones {
        left: clamp(52px, 9.2vw, 92px);
        top: clamp(248px, 62.8vh, 360px);
        width: clamp(150px, 23vw, 230px);
        gap: clamp(10px, 2.6vh, 18px);
      }
    }

    @keyframes room-breathe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.2px); }
    }

    @keyframes menu-plate-filter-breathe {
      0% { filter: brightness(0.98) contrast(1.02); }
      48% { filter: brightness(1.035) contrast(1.055); }
      100% { filter: brightness(0.98) contrast(1.02); }
    }

    @keyframes menu-right-bg-breathe {
      0% { opacity: 0.76; filter: brightness(1.44) contrast(1.08) saturate(1.05); }
      52% { opacity: 0.86; filter: brightness(1.62) contrast(1.12) saturate(1.1); }
      100% { opacity: 0.76; filter: brightness(1.44) contrast(1.08) saturate(1.05); }
    }

    @keyframes character-breathe {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.86; }
      52% { transform: translate3d(-1px, 0.8px, 0) scale(1.006); opacity: 0.96; }
    }

    @keyframes menu-vhs-scan {
      0% { transform: translateY(0); }
      100% { transform: translateY(3px); }
    }

    @keyframes menu-grain-drift {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(3px, 7px, 0); }
    }
  ]]></style>
</head>
<body class="main-menu-open">
  <main class="game-stage" aria-label="安全屋横屏场景">
    <img class="room" src="assets/safety-room-mobile.jpg" alt="安全屋场景" />
    <div class="shade" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
  </main>

  <section class="main-menu" aria-label="主界面">
    <div class="menu-background">
      <div class="menu-left-plate" aria-hidden="true"></div>
      <div class="menu-scene-bridge" aria-hidden="true"></div>
      <div class="menu-monster" aria-hidden="true"></div>
      <div class="menu-hit-zones">
        <button class="menu-hit" type="button" data-start="new">New Game</button>
        <button class="menu-hit" type="button" data-start="continue">Continue</button>
      </div>
      <div class="menu-debug-label">FULL MOBILE ROUTE · TAP MENU TEXT</div>
    </div>
  </section>

  <section class="intro-screen" aria-label="第一夜过场">
    <div class="intro-line">Night 1</div>
  </section>

  <div class="hud" aria-label="第一夜时间">
    <span>NIGHT 1</span>
    <strong>12 AM</strong>
  </div>

  <input id="tabletSwitch" type="checkbox" />
  <label class="tablet-button" for="tabletSwitch">TABLET</label>

  <section class="tablet" aria-label="平板监控">
    <div class="tablet-panel">
      <p class="tablet-title">CAM 09 SAFE ROOM</p>
      <label class="close" for="tabletSwitch">CLOSE</label>
      <div class="tablet-feed" aria-hidden="true"></div>
    </div>
  </section>

  <div class="portrait-lock" aria-hidden="true">
    <div>
      <strong>请横屏打开</strong>
      <span>旋转手机或平板后继续</span>
    </div>
  </div>

  <script type="text/javascript"><![CDATA[
    var body = document.body;
    var startButtons = document.querySelectorAll("[data-start]");
    var tabletSwitch = document.getElementById("tabletSwitch");
    var audioContext = null;
    var masterGain = null;
    var menuBus = null;
    var nightBus = null;
    var unlocked = false;
    var ambientStarted = false;
    var mixTimer = null;

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function smoothGain(gainNode, value, fadeSec) {
      if (!audioContext || !gainNode) return;
      var now = audioContext.currentTime;
      gainNode.gain.cancelScheduledValues(now);
      gainNode.gain.setValueAtTime(gainNode.gain.value, now);
      gainNode.gain.linearRampToValueAtTime(clamp(value, 0, 1), now + fadeSec);
    }

    function ensureAudio() {
      var AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;
      if (!audioContext) {
        audioContext = new AudioContextClass();
        masterGain = audioContext.createGain();
        menuBus = audioContext.createGain();
        nightBus = audioContext.createGain();
        masterGain.gain.value = 0;
        menuBus.gain.value = 0;
        nightBus.gain.value = 0;
        menuBus.connect(masterGain);
        nightBus.connect(masterGain);
        masterGain.connect(audioContext.destination);
      }
      unlocked = true;
      if (audioContext.state === "suspended") audioContext.resume();
      if (!ambientStarted) startAmbient();
      updateMix();
      scheduleMix();
    }

    function createNoiseBuffer() {
      var sampleRate = audioContext.sampleRate;
      var buffer = audioContext.createBuffer(1, sampleRate * 2, sampleRate);
      var data = buffer.getChannelData(0);
      for (var index = 0; index < data.length; index += 1) {
        data[index] = (Math.random() * 2 - 1) * 0.55;
      }
      return buffer;
    }

    function createDrone(target, type, frequency, gainValue, filterFrequency) {
      var osc = audioContext.createOscillator();
      var filter = audioContext.createBiquadFilter();
      var gain = audioContext.createGain();
      osc.type = type;
      osc.frequency.value = frequency;
      filter.type = "lowpass";
      filter.frequency.value = filterFrequency;
      filter.Q.value = 0.55;
      gain.gain.value = gainValue;
      osc.connect(filter).connect(gain).connect(target);
      osc.start();
    }

    function createNoise(target, gainValue, frequency) {
      var source = audioContext.createBufferSource();
      var filter = audioContext.createBiquadFilter();
      var gain = audioContext.createGain();
      source.buffer = createNoiseBuffer();
      source.loop = true;
      filter.type = "bandpass";
      filter.frequency.value = frequency;
      filter.Q.value = 0.7;
      gain.gain.value = gainValue;
      source.connect(filter).connect(gain).connect(target);
      source.start();
    }

    function startAmbient() {
      if (!audioContext || ambientStarted) return;
      ambientStarted = true;
      createDrone(menuBus, "triangle", 58, 0.23, 240);
      createDrone(menuBus, "sine", 78, 0.17, 280);
      createDrone(menuBus, "sawtooth", 96, 0.035, 360);
      createNoise(menuBus, 0.024, 340);
      createDrone(nightBus, "sine", 46, 0.14, 170);
      createDrone(nightBus, "triangle", 58, 0.11, 205);
      createNoise(nightBus, 0.014, 190);
    }

    function playClick() {
      if (!audioContext || !masterGain) return;
      var now = audioContext.currentTime;
      var osc = audioContext.createOscillator();
      var gain = audioContext.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(62, now + 0.12);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.2, now + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
      osc.connect(gain).connect(masterGain);
      osc.start(now);
      osc.stop(now + 0.18);
    }

    function getScene() {
      if (body.classList.contains("main-menu-open")) return "menu";
      if (body.classList.contains("intro-open")) return "intro";
      return "night";
    }

    function updateMix() {
      if (!unlocked || !audioContext || !masterGain || !menuBus || !nightBus) return;
      var scene = getScene();
      smoothGain(masterGain, 0.9, 0.28);
      smoothGain(menuBus, scene === "menu" ? 0.44 : (scene === "night" ? 0.08 : 0), 0.36);
      smoothGain(nightBus, scene === "night" ? 0.34 : (scene === "menu" ? 0.08 : 0), 0.36);
    }

    function scheduleMix() {
      if (mixTimer) return;
      mixTimer = window.setTimeout(function () {
        mixTimer = null;
        updateMix();
        scheduleMix();
      }, 220);
    }

    function enterNight(withIntro) {
      ensureAudio();
      playClick();
      body.classList.remove("main-menu-open");
      if (!withIntro) {
        updateMix();
        return;
      }
      body.classList.add("intro-open");
      updateMix();
      window.setTimeout(function () {
        body.classList.remove("intro-open");
        updateMix();
      }, 1550);
    }

    for (var i = 0; i < startButtons.length; i += 1) {
      startButtons[i].addEventListener("click", function (event) {
        var mode = event.currentTarget.getAttribute("data-start");
        enterNight(mode === "new");
      });
    }

    if (tabletSwitch) {
      tabletSwitch.addEventListener("change", function () {
        ensureAudio();
        playClick();
      });
    }

    document.addEventListener("visibilitychange", function () {
      if (!audioContext || !masterGain) return;
      if (document.hidden) smoothGain(masterGain, 0, 0.12);
      else updateMix();
    });
  ]]></script>
</body>
</html>
