<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>安全屋场景</title>
  <style>
    :root {
      --night-deep: #03070c;
      --night-mid: #07121e;
      --storm-blue: #0f2236;
      --glass-fog: rgba(113, 149, 181, 0.1);
      --text: #d8e2ec;
      --text-muted: #9eb2c4;
    }

    @property --freddy-jit-x {
      syntax: "<length>";
      inherits: false;
      initial-value: 0px;
    }

    @property --freddy-jit-y {
      syntax: "<length>";
      inherits: false;
      initial-value: 0px;
    }

    @property --freddy-jit-r {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: radial-gradient(circle at 50% 22%, #10213a 0%, #060b13 45%, #02050a 100%);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      transform: none;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    .viewport {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(to bottom, #0d1927 0%, #060b13 52%, #02050a 100%);
      cursor: default;
      --flash-x: 50%;
      --flash-y: 52%;
      --scene-scale: 1;
      --scene-stretch-y: 1;
      --scene-shift-y: 0%;
    }

    .viewport::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 56%, rgba(0, 0, 0, 0.42) 0%, rgba(0, 0, 0, 0) 52%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.18) 0%, rgba(0, 0, 0, 0.58) 100%);
      mix-blend-mode: multiply;
      opacity: 0.22;
      transition: opacity 180ms ease;
    }

    .viewport::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      background:
        radial-gradient(circle at var(--flash-x) var(--flash-y), rgba(247, 251, 255, 0.98) 0%, rgba(229, 240, 252, 0.92) 5.5%, rgba(201, 219, 238, 0.58) 13%, rgba(149, 171, 195, 0.24) 24%, rgba(94, 116, 139, 0.06) 34%, rgba(94, 116, 139, 0) 42%),
        radial-gradient(ellipse 42% 28% at var(--flash-x) calc(var(--flash-y) + 4%), rgba(222, 235, 250, 0.28) 0%, rgba(188, 207, 228, 0.14) 22%, rgba(145, 166, 188, 0.03) 48%, rgba(145, 166, 188, 0) 62%);
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 72ms linear;
      filter: blur(0.05px) contrast(1.08) saturate(0.35);
    }

    .viewport.flashlight-active::after {
      opacity: 1;
    }

    .viewport.flashlight-recover::after {
      opacity: 0.08;
      transition-duration: 150ms;
    }

    .panorama {
      position: absolute;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      will-change: transform;
      transform: translateX(0);
      filter: saturate(0.92) contrast(1.04);
      transform-origin: 50% 52%;
      animation: camera-breath-strong 2.9s ease-in-out infinite;
    }

    .left-panel,
    .right-panel {
      display: none;
    }

    .panorama::before {
      display: none;
    }

    .panel {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
    }

    .side-real-photo {
      position: absolute;
      inset: 0;
      background-image: url("assets/safety-room-comic-reference.jpg");
      background-size: cover;
      filter: brightness(0.92) contrast(1.1) grayscale(1);
      z-index: 1;
      opacity: 0.68;
    }

    .left-panel .side-real-photo {
      background-position: 50% 100%;
      transform: translateY(calc(var(--scene-shift-y) * 1.36)) scale(var(--scene-scale));
      transform-origin: 50% 50%;
    }

    .right-panel .side-real-photo {
      background-position: 50% 100%;
      transform: translateY(calc(var(--scene-shift-y) * 1.36)) scale(var(--scene-scale));
      transform-origin: 50% 50%;
    }

    .left-panel .layout-overlay,
    .right-panel .layout-overlay {
      display: none;
    }

    .layout-overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .left-figures {
      position: absolute;
      left: 15%;
      top: 43%;
      width: 23%;
      height: 13%;
      background:
        radial-gradient(circle at 24% 28%, rgba(206, 220, 229, 0.22) 0 16%, rgba(0, 0, 0, 0) 17%),
        radial-gradient(circle at 50% 30%, rgba(206, 220, 229, 0.2) 0 14%, rgba(0, 0, 0, 0) 15%),
        radial-gradient(ellipse at 24% 72%, rgba(166, 185, 199, 0.24) 0 24%, rgba(0, 0, 0, 0) 25%),
        radial-gradient(ellipse at 52% 74%, rgba(166, 185, 199, 0.22) 0 22%, rgba(0, 0, 0, 0) 23%);
      filter: blur(0.35px);
      opacity: 0.72;
    }

    .left-bin {
      position: absolute;
      right: 10%;
      bottom: 9%;
      width: 11%;
      height: 17%;
      border-radius: 12px 12px 10px 10px;
      background: linear-gradient(to bottom, rgba(30, 44, 56, 0.54), rgba(9, 16, 24, 0.78));
      box-shadow: 0 12px 20px rgba(0, 0, 0, 0.44);
      opacity: 0.7;
    }

    .right-poster {
      position: absolute;
      left: 16%;
      top: 26%;
      width: 18%;
      height: 34%;
      border-radius: 2px;
      border: 1px solid rgba(214, 225, 235, 0.22);
      background:
        linear-gradient(to bottom, rgba(228, 236, 243, 0.22), rgba(203, 215, 225, 0.15)),
        linear-gradient(to bottom, rgba(13, 24, 36, 0) 68%, rgba(13, 24, 36, 0.26) 100%);
      box-shadow: 0 6px 10px rgba(0, 0, 0, 0.26);
      opacity: 0.64;
    }

    .right-poster::before {
      content: "";
      position: absolute;
      left: 18%;
      right: 18%;
      top: 16%;
      height: 6%;
      background: rgba(53, 67, 78, 0.42);
      border-radius: 3px;
      box-shadow: 0 18px 0 rgba(53, 67, 78, 0.28), 0 36px 0 rgba(53, 67, 78, 0.22);
    }

    .right-clock {
      position: absolute;
      right: 18%;
      top: 20%;
      width: 13%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: 2px solid rgba(202, 216, 227, 0.28);
      background: radial-gradient(circle at 45% 40%, rgba(224, 236, 246, 0.3), rgba(26, 39, 50, 0.24) 64%, rgba(8, 14, 22, 0.56) 100%);
      box-shadow: 0 8px 12px rgba(0, 0, 0, 0.3);
      opacity: 0.6;
    }

    .right-clock::before {
      content: "";
      position: absolute;
      left: 49%;
      top: 28%;
      width: 1.5%;
      height: 23%;
      background: rgba(16, 25, 34, 0.72);
      transform: rotate(28deg);
      transform-origin: bottom center;
    }

    .edge-blend {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .left-panel .edge-blend {
      background: linear-gradient(to right, rgba(4, 9, 14, 0.4) 0%, rgba(4, 9, 14, 0.1) 24%, rgba(4, 9, 14, 0) 52%, rgba(4, 9, 14, 0) 93%, rgba(4, 9, 14, 0.03) 100%);
    }

    .center-panel .edge-blend {
      display: none;
    }

    .right-panel .edge-blend {
      background: linear-gradient(to right, rgba(4, 9, 14, 0.03) 0%, rgba(4, 9, 14, 0) 7%, rgba(4, 9, 14, 0) 48%, rgba(4, 9, 14, 0.1) 76%, rgba(4, 9, 14, 0.4) 100%);
    }

    .panel-shadow {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(to bottom, rgba(5, 10, 16, 0.08) 0%, rgba(4, 8, 13, 0.42) 56%, rgba(2, 5, 9, 0.72) 100%),
        radial-gradient(circle at 14% 48%, rgba(129, 173, 205, 0.1) 0%, rgba(7, 13, 22, 0) 50%),
        radial-gradient(circle at 82% 12%, rgba(166, 203, 228, 0.04) 0%, rgba(8, 15, 26, 0) 46%);
      mix-blend-mode: multiply;
    }

    .panel-grime {
      position: absolute;
      inset: 0;
      z-index: 3;
      background-image:
        radial-gradient(circle at 18% 30%, rgba(7, 16, 25, 0.3) 0%, rgba(7, 16, 25, 0) 20%),
        radial-gradient(circle at 72% 54%, rgba(10, 18, 29, 0.25) 0%, rgba(10, 18, 29, 0) 24%),
        linear-gradient(102deg, rgba(167, 194, 211, 0.05) 2%, rgba(167, 194, 211, 0) 22%);
      pointer-events: none;
    }

    .left-panel .panel-shadow,
    .right-panel .panel-shadow,
    .left-panel .panel-grime,
    .right-panel .panel-grime {
      opacity: 0.55;
    }

    .center-panel {
      background: #080f17;
    }

    .photo-wrap {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      background: #000 url("assets/safety-room-comic-reference.jpg") center center / cover no-repeat;
    }

    .photo-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 28% 7%, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0.12) 18%, rgba(255, 255, 255, 0) 42%),
        radial-gradient(ellipse at 50% 76%, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 20%, rgba(255, 255, 255, 0) 48%);
      mix-blend-mode: screen;
    }

    .photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      filter: brightness(0.94) contrast(1.18) grayscale(1);
      transform: translateY(var(--scene-shift-y)) scaleY(calc(var(--scene-scale) * var(--scene-stretch-y)));
      transform-origin: 50% 50%;
    }

    .photo-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.08) 0%, rgba(0, 0, 0, 0.2) 70%, rgba(0, 0, 0, 0.36) 100%),
        radial-gradient(circle at 52% 46%, rgba(255, 255, 255, 0.05) 0%, rgba(0, 0, 0, 0) 44%);
    }

    .vent-shadow-layer {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background: none;
      mix-blend-mode: multiply;
      opacity: 0.92;
      filter: blur(0.18px) contrast(1.06);
      transition: opacity 120ms linear, filter 120ms linear;
    }

    .vent-shadow-layer::before,
    .vent-shadow-layer::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 1px;
      background:
        radial-gradient(ellipse at 49% 52%, rgba(0, 0, 0, 0.74) 0%, rgba(0, 0, 0, 0.56) 42%, rgba(0, 0, 0, 0.24) 70%, rgba(0, 0, 0, 0) 100%),
        linear-gradient(104deg, rgba(0, 0, 0, 0.46) 0%, rgba(0, 0, 0, 0.28) 58%, rgba(0, 0, 0, 0) 100%);
      mix-blend-mode: multiply;
      filter: blur(0.72px) contrast(1.01);
      opacity: 0.68;
      box-shadow: none;
      -webkit-mask-image: radial-gradient(ellipse at 50% 54%, #000 0 42%, rgba(0, 0, 0, 0.7) 60%, rgba(0, 0, 0, 0.22) 78%, transparent 100%);
      mask-image: radial-gradient(ellipse at 50% 54%, #000 0 42%, rgba(0, 0, 0, 0.7) 60%, rgba(0, 0, 0, 0.22) 78%, transparent 100%);
    }

    .vent-shadow-layer::before {
      left: 19.1%;
      top: 61.4%;
      width: 8.4%;
      height: 20.2%;
      clip-path: polygon(18% 10%, 92% 2%, 80% 88%, 7% 98%, 1% 28%);
      transform: skewY(-1.4deg) rotate(-0.25deg);
    }

    .vent-shadow-layer::after {
      left: 87.4%;
      top: 56.2%;
      width: 5.2%;
      height: 18.8%;
      clip-path: polygon(10% 8%, 94% 2%, 98% 90%, 16% 98%, 2% 33%);
      transform: skewY(0.9deg) rotate(0.15deg);
    }

    .viewport.flashlight-active .vent-shadow-layer {
      -webkit-mask-image: radial-gradient(circle at var(--flash-x) var(--flash-y), rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0) 15%, rgba(0, 0, 0, 0.62) 27%, #000 41%);
      mask-image: radial-gradient(circle at var(--flash-x) var(--flash-y), rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0) 15%, rgba(0, 0, 0, 0.62) 27%, #000 41%);
      opacity: 0.86;
      filter: blur(0.12px) contrast(1.02);
    }

    .book-privacy-mask {
      display: none;
      position: absolute;
      left: 49.3%;
      bottom: 16.3%;
      width: 8.4%;
      height: 6.4%;
      z-index: 4;
      pointer-events: none;
      border-radius: 10px;
      background: rgba(18, 22, 28, 0.08);
      backdrop-filter: blur(3px) saturate(0.85);
      -webkit-backdrop-filter: blur(3px) saturate(0.85);
      transform: rotate(-15deg);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.14) inset;
    }

    .door-presence {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      transform: translateY(var(--scene-shift-y)) scaleY(calc(var(--scene-scale) * var(--scene-stretch-y)));
      transform-origin: 50% 50%;
      --door-frame-left: 39.98%;
      --door-frame-top: 9.62%;
      --door-frame-width: 16.9%;
      --door-frame-height: 76.9%;
      --door-window-left: 42.01%;
      --door-window-top: 19.1%;
      --door-window-width: 3.14%;
      --door-window-height: 68.1%;
    }

    .comic-room-mode .door-presence {
      --door-frame-left: 36.1%;
      --door-frame-top: 6.2%;
      --door-frame-width: 10.4%;
      --door-frame-height: 72.5%;
      --door-window-left: 39.05%;
      --door-window-top: 13.5%;
      --door-window-width: 4.2%;
      --door-window-height: 56.5%;
    }

    .door-outside-shadow {
      position: absolute;
      left: calc(var(--door-window-left) - 0.03%);
      top: calc(var(--door-window-top) - 0.3%);
      width: calc(var(--door-window-width) - 0.06%);
      height: calc(var(--door-window-height) + 0.5%);
      background:
        radial-gradient(ellipse at 62% 20%, rgba(3, 6, 10, 0.78) 0%, rgba(3, 6, 10, 0.38) 56%, rgba(3, 6, 10, 0) 100%),
        linear-gradient(to bottom, rgba(3, 6, 11, 0.24) 0%, rgba(3, 6, 11, 0.58) 64%, rgba(3, 6, 11, 0.82) 100%);
      mix-blend-mode: multiply;
      filter: blur(0.7px);
      opacity: 0.94;
    }

    .door-window-mask {
      position: absolute;
      left: var(--door-window-left);
      top: var(--door-window-top);
      width: var(--door-window-width);
      height: var(--door-window-height);
      overflow: hidden;
      background: rgba(12, 18, 24, 0.08);
      box-shadow: 0 0 0 1px rgba(8, 12, 16, 0.62) inset;
      transition: none;
    }

    .door-idle-ambience {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 48% 18%, rgba(142, 160, 176, 0.1) 0%, rgba(142, 160, 176, 0.03) 36%, rgba(142, 160, 176, 0) 68%),
        radial-gradient(ellipse at 52% 74%, rgba(34, 46, 58, 0.42) 0%, rgba(14, 20, 28, 0.2) 56%, rgba(8, 12, 18, 0) 100%),
        linear-gradient(to bottom, rgba(15, 22, 30, 0.2) 0%, rgba(9, 13, 18, 0.34) 100%);
      mix-blend-mode: screen;
      opacity: 0.44;
      filter: blur(0.2px);
      animation: door-idle-breathe 5.6s ease-in-out infinite;
    }

    .door-window-mask::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(169, 201, 224, 0.07) 0%, rgba(169, 201, 224, 0) 28%),
        repeating-linear-gradient(
          92deg,
          rgba(190, 215, 233, 0.06) 0 1px,
          rgba(190, 215, 233, 0) 1px 4px
        );
      mix-blend-mode: screen;
      opacity: 0.38;
      z-index: 2;
      pointer-events: none;
    }

    .door-window-mask::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(3, 8, 13, 0) 0%, rgba(3, 8, 13, 0.22) 36%, rgba(3, 8, 13, 0.56) 100%);
      z-index: 3;
      pointer-events: none;
    }

    .door-stage1-peek {
      position: absolute;
      left: calc(var(--door-frame-left) + 0.6%);
      top: calc(var(--door-frame-top) + 2.3%);
      width: calc(var(--door-frame-width) + 0.9%);
      height: calc(var(--door-frame-height) - 1.4%);
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      overflow: hidden;
      clip-path: polygon(45% 0%, 100% 0%, 97% 100%, 42% 100%);
      transition: opacity 160ms linear;
    }

    .door-stage1-peek::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.88) 0%, rgba(0, 0, 0, 0.42) 52%, rgba(0, 0, 0, 0.02) 100%),
        radial-gradient(ellipse at 66% 28%, rgba(80, 91, 101, 0.18) 0%, rgba(12, 16, 21, 0.02) 54%);
      mix-blend-mode: multiply;
    }

    .freddy-figure {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: 49% 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      mix-blend-mode: normal;
      opacity: 1;
      filter: brightness(0.7) contrast(1.42) saturate(0.84) sepia(0.05) drop-shadow(10px 0 18px rgba(0, 0, 0, 0.68));
      transform: translate3d(calc(-6% + var(--freddy-jitter-x, 0px)), var(--freddy-jitter-y, 0px), 0px) scale(1.04);
      transform-origin: 52% 100%;
      transition: transform var(--freddy-jitter-dur, 180ms) linear;
      will-change: transform;
      z-index: 1;
    }

    .eye-lock-glow {
      position: absolute;
      right: -8%;
      top: 33%;
      width: 102%;
      height: 18%;
      background: radial-gradient(circle at 72% 50%, rgba(213, 236, 255, 0.36) 0%, rgba(213, 236, 255, 0.12) 26%, rgba(213, 236, 255, 0) 58%);
      mix-blend-mode: screen;
      opacity: 0;
      filter: blur(0.45px);
      z-index: 4;
      pointer-events: none;
      transition: none;
    }

    .door-stage2-open,
    .door-stage3-open {
      position: absolute;
      left: var(--door-frame-left);
      top: var(--door-frame-top);
      width: var(--door-frame-width);
      height: var(--door-frame-height);
      opacity: 0;
      pointer-events: none;
      z-index: 6;
      transform-origin: 50% 50%;
      transform: translateZ(0);
      transition: opacity 180ms linear;
      filter: none;
      mix-blend-mode: normal;
      overflow: hidden;
      border-radius: 0;
      isolation: isolate;
      box-shadow: none;
    }

    .door-stage2-open {
      left: calc(var(--door-frame-left) - 3.25%);
      top: calc(var(--door-frame-top) - 1.7%);
      width: calc(var(--door-frame-width) + 6.3%);
      height: calc(var(--door-frame-height) + 4.2%);
      clip-path: none;
      overflow: visible;
    }

    .door-stage3-open {
      clip-path: polygon(2.6% 0%, 100% 0%, 97.4% 100%, 0% 100%);
    }

    .door-stage2-open img,
    .door-stage3-open img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: 50% 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      position: relative;
      z-index: 1;
      filter: brightness(0.94) contrast(1.18) saturate(0.86);
      transition: transform var(--stage2-jitter-dur, 180ms) linear;
      will-change: transform;
      -webkit-mask-image: none;
      mask-image: none;
    }

    .door-stage2-open img {
      z-index: 3;
      transform: translate3d(calc(1.2% + var(--stage2-jitter-x, 0px)), calc(1.6% + var(--stage2-jitter-y, 0px)), 0px) rotate(var(--stage2-jitter-tilt, 0deg)) scale(var(--stage2-jitter-scale, 1));
      transform-origin: 50% 100%;
      filter: brightness(0.82) contrast(1.34) saturate(0.82) sepia(0.06) drop-shadow(0 18px 22px rgba(0, 0, 0, 0.72));
    }

    .door-stage3-open {
      z-index: 7;
      filter: none;
    }

    .door-stage3-open img {
      object-position: 41% 55%;
      transform: translate3d(var(--stage3-jitter-x, 0px), var(--stage3-jitter-y, 0px), 0px) rotate(var(--stage3-jitter-tilt, 0deg)) scale(var(--stage3-jitter-scale, 1));
      transition: transform var(--stage3-jitter-dur, 180ms) linear;
      filter: brightness(0.96) contrast(1.2) saturate(0.88) sepia(0.06);
    }

    .stage3-head-jitter,
    .stage3-arm-left-jitter,
    .stage3-arm-right-jitter {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background-image: var(--stage3-overlay-image, none);
      background-size: cover;
      background-position: 41% 55%;
      opacity: 0;
      transition: opacity 130ms linear;
      will-change: transform;
      mix-blend-mode: normal;
    }

    .stage3-head-jitter {
      clip-path: ellipse(18% 16% at 46% 19%);
      transform: translate3d(var(--stage3-head-jitter-x, 0px), var(--stage3-head-jitter-y, 0px), 0px) rotate(var(--stage3-head-jitter-tilt, 0deg)) scale(var(--stage3-head-jitter-scale, 1));
      transition: transform var(--stage3-head-jitter-dur, 110ms) steps(1, end), opacity 130ms linear;
      filter: brightness(1.08) contrast(1.16) saturate(0.9);
    }

    .stage3-arm-left-jitter {

    .main-menu-layout {
      position: relative;
      width: 100%;
      height: 100%;
      background: url("menu-main-exact.png") center center / cover no-repeat;
      --wall-breath: 1;
      --wall-dim: 0;
      --wall-stain-opacity: 0.48;
      --wall-stain-x: 0px;
      --wall-stain-y: 0px;
      --wall-shadow-x: 0px;
      --wall-shadow-y: 0px;
      --wall-shadow-opacity: 0.42;
      --wall-human-x: -10px;
      --wall-human-opacity: 0.035;
      --wall-noise-boost: 0;
      --wall-chroma-x: 0px;
      --wall-chroma-opacity: 0.08;
    }

    .wall-breath-layer,
    .wall-stain-layer,
    .wall-shadow-layer,
    .wall-human-layer,
    .wall-local-dim-layer,
    .menu-chroma-layer {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: clamp(360px, 43vw, 740px);
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
      transform-origin: 23% 42%;
    }

    .wall-breath-layer {
      background: url("menu-main-exact.png") left center / auto 100% no-repeat;
      opacity: 0.12;
      filter: brightness(0.92) contrast(1.08) saturate(0.74);
      transform: scale(var(--wall-breath));
      mix-blend-mode: multiply;
      animation: wall-base-breathe 11.7s linear infinite;
    }

    .wall-stain-layer {
      opacity: var(--wall-stain-opacity);
      transform: translate3d(var(--wall-stain-x), var(--wall-stain-y), 0);
      background:
        radial-gradient(ellipse at 30% 22%, rgba(12, 7, 4, 0.36) 0%, rgba(12, 7, 4, 0.12) 24%, rgba(0, 0, 0, 0) 58%),
        radial-gradient(ellipse at 18% 59%, rgba(43, 29, 18, 0.3) 0%, rgba(20, 12, 7, 0.15) 34%, rgba(0, 0, 0, 0) 70%),
        radial-gradient(ellipse at 43% 72%, rgba(67, 48, 29, 0.18) 0%, rgba(15, 9, 5, 0.12) 30%, rgba(0, 0, 0, 0) 66%),
        repeating-linear-gradient(92deg, rgba(111, 83, 55, 0.08) 0 1px, rgba(0, 0, 0, 0) 1px 34px);
      mix-blend-mode: multiply;
      animation: stain-slow-crawl 17.3s linear infinite;
    }

    .wall-stain-layer::after {
      content: "";
      position: absolute;
      left: 22%;
      top: 18%;
      width: 38%;
      height: 64%;
      background:
        linear-gradient(to bottom, rgba(61, 43, 26, 0.22), rgba(61, 43, 26, 0.02) 60%, rgba(0, 0, 0, 0)),
        radial-gradient(ellipse at 48% 12%, rgba(85, 63, 39, 0.2), rgba(0, 0, 0, 0) 45%);
      filter: blur(9px);
      opacity: 0.22;
      transform: translateY(var(--wall-stain-y));
      animation: stain-run 23s linear infinite;
    }

    .wall-shadow-layer {
      opacity: var(--wall-shadow-opacity);
      transform: translate3d(var(--wall-shadow-x), var(--wall-shadow-y), 0);
      background:
        radial-gradient(ellipse at 67% 36%, rgba(0, 0, 0, 0.58) 0%, rgba(0, 0, 0, 0.25) 26%, rgba(0, 0, 0, 0) 58%),
        radial-gradient(ellipse at 34% 69%, rgba(0, 0, 0, 0.34) 0%, rgba(0, 0, 0, 0.14) 30%, rgba(0, 0, 0, 0) 66%);
      filter: blur(16px);
      mix-blend-mode: multiply;
      animation: impossible-shadow 13.1s linear infinite;
    }

    .wall-human-layer {
      opacity: var(--wall-human-opacity);
      transform: translate3d(var(--wall-human-x), 0, 0);
      filter: blur(9px);
      mix-blend-mode: multiply;
    }

    .wall-human-layer::before {
      content: "";
      position: absolute;
      left: 48%;
      top: 25%;
      width: 18%;
      height: 54%;
      background:
        radial-gradient(ellipse at 50% 12%, rgba(0, 0, 0, 0.74) 0%, rgba(0, 0, 0, 0.36) 18%, rgba(0, 0, 0, 0) 34%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0.62) 0%, rgba(0, 0, 0, 0.32) 35%, rgba(0, 0, 0, 0) 66%);
      animation: wall-human-drift 19s linear infinite;
    }

    .wall-local-dim-layer {
      opacity: calc(0.22 + var(--wall-dim));
      background:
        radial-gradient(ellipse at 36% 44%, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.08) 28%, rgba(0, 0, 0, 0.28) 76%),
        radial-gradient(ellipse at 16% 82%, rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0) 46%);
      mix-blend-mode: multiply;
      transition: opacity 180ms linear;
    }

    .menu-chroma-layer {
      z-index: 7;
      opacity: var(--wall-chroma-opacity);
      background: url("menu-main-exact.png") left center / auto 100% no-repeat;
      transform: translateX(var(--wall-chroma-x));
      filter: contrast(1.15) brightness(0.72) sepia(0.24) hue-rotate(175deg);
      mix-blend-mode: screen;
    }

    .main-menu-screen.environment-hit .main-menu-layout {
      --wall-dim: 0.1;
      --wall-noise-boost: 0.24;
      --wall-chroma-opacity: 0.16;
    }

    .main-menu-screen.environment-hit .wall-shadow-layer {
      transition: transform 120ms linear, opacity 120ms linear;
    }

    .main-menu-screen.environment-glitch .menu-chroma-layer {
      --wall-chroma-x: 2px;
      opacity: 0.22;
    }

    .menu-text-echo {
      position: absolute;
      left: clamp(42px, 3.9vw, 88px);
      top: clamp(70px, 8vh, 94px);
      z-index: 6;
      pointer-events: none;
      max-width: 330px;
      font-family: "Impact", "Haettenschweiler", "Arial Narrow Bold", sans-serif;
      text-transform: uppercase;
      color: rgba(222, 204, 176, 0.12);
      font-size: clamp(28px, 4.6vw, 70px);
      line-height: 0.92;
      letter-spacing: 0.03em;
      filter: brightness(var(--menu-text-brightness, 1)) blur(0.2px);
      transform: translate3d(var(--menu-text-x, 0px), var(--menu-text-y, 0px), 0) skewX(var(--menu-text-skew, 0deg));
      mix-blend-mode: screen;
      text-shadow: 1px 0 rgba(255, 255, 255, 0.06), -1px 0 rgba(0, 0, 0, 0.28);
      transition: transform 60ms linear, filter 60ms linear, opacity 60ms linear;
      opacity: var(--menu-text-opacity, 0.18);
    }

    .menu-text-echo span {
      display: block;
    }

    .menu-text-echo.is-flicker {
      --menu-text-brightness: 0.55;
      --menu-text-opacity: 0.08;
    }

    .menu-vignette {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 66% 46%, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.14) 52%, rgba(0, 0, 0, 0.72) 100%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0.34));
      mix-blend-mode: multiply;
      opacity: 0.72;
    }

    @keyframes wall-base-breathe {
      0% { transform: scale(1.002); opacity: 0.1; }
      37% { transform: scale(1.01); opacity: 0.13; }
      71% { transform: scale(1.006); opacity: 0.115; }
      100% { transform: scale(1.002); opacity: 0.1; }
    }

    @keyframes stain-slow-crawl {
      0% { filter: contrast(1) brightness(0.96); }
      41% { filter: contrast(1.08) brightness(0.9); }
      100% { filter: contrast(1.02) brightness(0.95); }
    }

    @keyframes stain-run {
      0% { transform: translateY(-6px) scaleY(0.98); opacity: 0.16; }
      53% { transform: translateY(4px) scaleY(1.03); opacity: 0.25; }
      100% { transform: translateY(10px) scaleY(1.01); opacity: 0.18; }
    }

    @keyframes impossible-shadow {
      0% { transform: translate3d(-2px, 0px, 0) scaleX(1); }
      29% { transform: translate3d(5px, -2px, 0) scaleX(1.04); }
      64% { transform: translate3d(-4px, 3px, 0) scaleX(0.98); }
      100% { transform: translate3d(2px, -1px, 0) scaleX(1.02); }
    }

    @keyframes wall-human-drift {
      0% { transform: translateX(-22px) scaleX(0.92); opacity: 0; }
      19% { opacity: 0.48; }
      52% { transform: translateX(18px) scaleX(1.04); opacity: 0.6; }
      83% { opacity: 0.2; }
      100% { transform: translateX(31px) scaleX(0.96); opacity: 0; }
    }

    .main-menu-left {
      position: absolute;

      top: 0;

    .main-menu-title,

    .main-menu-actions {

    #character,
    .character-void,
    .character-ghost,

      position: absolute;
      pointer-events: none;

    .character-void {
      left: clamp(412px, 35vw, 630px);

        radial-gradient(ellipse at 58% 32%, rgba(101, 82, 57, 0.12) 0%, rgba(101, 82, 57, 0) 36%),
        linear-gradient(to right, rgba(4, 3, 2, 0) 0%, rgba(4, 3, 2, 0.68) 8%, rgba(4, 3, 2, 0.96) 19%, rgba(2, 2, 2, 1) 100%),
        repeating-linear-gradient(90deg, rgba(90, 73, 52, 0.09) 0 2px, rgba(0, 0, 0, 0) 2px 42px),

    #character {
      left: clamp(420px, 36vw, 650px);
      right: -2vw;
      top: -4vh;
      bottom: -4vh;

      --character-opacity: 1;
      --character-scale: 1;
      --character-pressure: 1;
      --character-brightness: 0.82;
      --character-contrast: 1.28;
      --character-x: 0px;
      --character-y: 0px;
      --character-blur: 0px;
      background-image: var(--character-image);
      opacity: var(--character-opacity);
      transform: translate3d(var(--character-x), var(--character-y), 0) scale(var(--character-scale)) scale(var(--character-pressure));
      transform-origin: 62% 48%;
      filter:
        brightness(var(--character-brightness))
        contrast(var(--character-contrast))
        saturate(0.72)
        sepia(0.16)
        blur(var(--character-blur));
      transition: transform 84ms linear, filter 72ms linear, opacity 44ms linear;
      -webkit-mask-image: linear-gradient(to right, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.9) 8%, rgba(0, 0, 0, 1) 24%);
      mask-image: linear-gradient(to right, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.9) 8%, rgba(0, 0, 0, 1) 24%);
    }

    #character::before,
    .menu-crt::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(242, 226, 202, 0.038) 0px,
          rgba(242, 226, 202, 0.038) 1px,
          rgba(0, 0, 0, 0.24) 2px,
          rgba(0, 0, 0, 0.24) 4px
        );

      opacity: 0.42;

      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;

      background:
        radial-gradient(circle at 50% 22%, rgba(255, 255, 255, 0.96) 0 0.8%, rgba(255, 255, 255, 0.42) 1.2%, rgba(255, 255, 255, 0) 3.4%),

        radial-gradient(ellipse at 55% 23%, rgba(234, 244, 255, 0.16) 0%, rgba(234, 244, 255, 0) 17%);
      mix-blend-mode: screen;
      transition: opacity 26ms linear;

  <script>
    (function initDoorStageEvent() {
      const body = document.body;
      const doorPresence = document.querySelector(".door-presence");
      const viewport = document.querySelector(".viewport");
      const cameraFeed = document.getElementById("cameraFeed");
      const nightHourLabel = document.getElementById("nightHourLabel");
      const nightLabel = document.getElementById("nightLabel");
      const nightHudHour = document.getElementById("nightHudHour");
      const nightHudLabel = document.getElementById("nightHudLabel");
      if (!doorPresence) return;

      let freddyBlackoutLayer = document.getElementById("freddyBlackoutLayer");
      if (!freddyBlackoutLayer) {
        freddyBlackoutLayer = document.createElement("div");
        freddyBlackoutLayer.id = "freddyBlackoutLayer";
        freddyBlackoutLayer.className = "freddy-blackout-layer";
        freddyBlackoutLayer.setAttribute("aria-hidden", "true");
        body.appendChild(freddyBlackoutLayer);
      }

      let freddyJumpscareLayer = document.getElementById("freddyJumpscareLayer");
      if (!freddyJumpscareLayer) {
        freddyJumpscareLayer = document.createElement("div");
        freddyJumpscareLayer.id = "freddyJumpscareLayer";
        freddyJumpscareLayer.className = "freddy-jumpscare-layer";
        freddyJumpscareLayer.setAttribute("aria-hidden", "true");
        freddyJumpscareLayer.innerHTML = '<img class="freddy-jumpscare-figure" data-src="assets/freddy-jumpscare-closeup.png" data-mobile-src="assets/freddy-jumpscare-closeup-mobile.jpg" data-fallback-src="assets/freddy-door-open-stage3.jpeg" alt="" decoding="async" /><span class="freddy-jumpscare-mouth" aria-hidden="true"></span><span class="freddy-jumpscare-gameover">You have been dismembered.</span>';
        body.appendChild(freddyJumpscareLayer);
      }

      let nightCompleteLayer = document.getElementById("nightCompleteLayer");
      if (!nightCompleteLayer) {
        nightCompleteLayer = document.createElement("div");
        nightCompleteLayer.id = "nightCompleteLayer";
        nightCompleteLayer.className = "night-complete-layer";
        nightCompleteLayer.setAttribute("aria-hidden", "true");
        nightCompleteLayer.innerHTML = '<span class="night-complete-time">6 A.M.</span><span class="night-complete-half night-complete-half-top">6 A.M.</span><span class="night-complete-half night-complete-half-bottom">6 A.M.</span><span class="night-complete-clear">Night 1 Cleared</span>';
        body.appendChild(nightCompleteLayer);
      }

      const freddyJumpscareFigure = freddyJumpscareLayer.querySelector(".freddy-jumpscare-figure");
      const isMobileAssetMode = () => {
        if (window.matchMedia) {
          return window.matchMedia("(pointer: coarse), (max-width: 1180px)").matches;
        }
        return window.innerWidth <= 1180;
      };
      const resolveDeferredImageSrc = (img) => {
        if (!img) return "";
        if (isMobileAssetMode()) {
          return img.dataset.mobileSrc || img.dataset.src || img.getAttribute("src") || "";
        }
        return img.dataset.src || img.getAttribute("src") || "";
      };
      const hydrateDeferredImage = (img) => {
        if (!img || img.getAttribute("src")) return;
        const source = resolveDeferredImageSrc(img);
        if (source) img.setAttribute("src", source);
      };
      const hydrateDoorStageImages = (stage) => {
        const selector = stage === 1 ? ".door-stage1-open img" : ".door-stage2-open img";
        Array.from(doorPresence.querySelectorAll(selector)).forEach(hydrateDeferredImage);
      };
      if (freddyJumpscareFigure) {
        freddyJumpscareFigure.addEventListener("error", () => {
          const fallback = freddyJumpscareFigure.getAttribute("data-fallback-src") || "";
          if (!fallback || freddyJumpscareFigure.dataset.fallbackApplied === "1") return;
          freddyJumpscareFigure.dataset.fallbackApplied = "1";
          freddyJumpscareFigure.src = fallback;
        });
      }

      body.classList.remove("freddy-disabled");

      const NIGHT_DURATION_MS = 10 * 60 * 1000;
      const NIGHT_TOTAL_HOURS = 6;
      const NIGHT_ATTACK_COUNT_MIN = 3;
      const NIGHT_ATTACK_COUNT_MAX = 4;
      const FREDDY_ATTACKS_ENABLED = true;
      const STAGE1_DURATION_MIN = 6800;
      const STAGE1_DURATION_MAX = 8800;
      const STAGE2_BREACH_MS = 10000;
      const FREDDY_BLACKOUT_IN_MS = 92;
      const FREDDY_BLACKOUT_HOLD_MS = 1500;
      const FREDDY_BLACKOUT_OUT_MS = 130;
      const FLASHLIGHT_HITS_MIN = 5;
      const FLASHLIGHT_HITS_MAX = 8;
      const FLASHLIGHT_PULSE_MS = 165;
      const FLASHLIGHT_RECOVER_MS = 210;
      const FLASHLIGHT_HIT_CLASS_MS = 170;
      const FLASHLIGHT_VISUAL_PROFILE = "fnaf4-cold-white-v1";
      const VENT_SHADOW_PROFILE = "flashlight-revealed-vent-soft-inner-v8";
      const FREDDY_CAMERA_WATCH_SLOWDOWN = 0.38;
      const FREDDY_CAMERA_FLASH_SLOWDOWN = 0.18;
      const POWER_MAX = 100;
      const POWER_AMBIENT_DRAIN_PER_MS = 0.000048;
      const POWER_TABLET_DRAIN_PER_MS = 0.000075;
      const POWER_ROOM_FLASH_COST = 0.68;
      const POWER_MONITOR_FLASH_COST = 0.58;
      const POWER_LOW_THRESHOLD = 38;
      const POWER_CRITICAL_THRESHOLD = 18;
      const POWER_NORMAL_PLAY_TARGET_REMAINING = "1.2-1.5 cells";
      const FREDDY_ATTACK_ROUTES = [
        {
          key: "route1",
          label: "Room 6 -> Room 7 -> Safe Room",
          steps: [
            { room: "room6", minMs: 8400, maxMs: 11800 },
            { room: "room7", minMs: 8200, maxMs: 11600 },
            { room: null, label: "right-turn", minMs: 3600, maxMs: 5200 },
            { room: null, label: "left-turn", minMs: 3200, maxMs: 4800 },
          ],
        },
        {
          key: "route2",
          label: "Room 4 -> Room 8 -> Safe Room",
          steps: [
            { room: "room4", minMs: 8400, maxMs: 11600 },
            { room: "room8", minMs: 9400, maxMs: 13200 },
          ],
        },
      ];

      let stage2Timer = null;
      let freddyBlackoutTimer = null;
      let freddyBlackoutHideTimer = null;
      let freddyBlackoutReleaseTimer = null;
      let flashlightPulseTimer = null;
      let flashlightRecoverTimer = null;
      let flashlightHitTimer = null;
      let monitorFlashTimer = null;
      let stage2FlickerTimer = null;
      let nightLoopTimer = null;
      let jumpscareEndTimer = null;
      let nightCompleteShowTimer = null;
      let nightCompleteSplitTimer = null;
      let nightCompleteReturnTimer = null;
      let freddyDangerWarningTimer = null;
      let jumpscareAudioCtx = null;
      let stage2AudioCtx = null;
      let nightCompleteAudioCtx = null;
      let survivalAudioPrimed = false;

      let currentDoorStage = 0;
      let doorStageClosing = false;
      let flashlightRequiredHits = FLASHLIGHT_HITS_MIN;
      let flashlightCurrentHits = 0;
      let powerLevel = POWER_MAX;
      let nightElapsedMs = 0;
      let nightStarted = false;
      let nightCleared = false;
      let attackTimeline = [];
      let nightAttackCount = NIGHT_ATTACK_COUNT_MIN;
      let nextAttackIndex = 0;
      let attackTriggeredCount = 0;
      let breachCount = 0;
      let activeFreddyRoute = null;
      let activeFreddyRouteStepIndex = -1;
      let activeFreddyRouteStep = null;
      let activeFreddyRouteStepMs = 0;
      let currentFreddyMonitorRoom = null;
      let jumpscareActive = false;
      let gameOverActive = false;
      let nightCompleteActive = false;
      let lastTickAt = performance.now();

      const randomBetween = (min, max) => Math.floor(min + Math.random() * (max - min + 1));
      const randomFloat = (min, max) => min + Math.random() * (max - min);
      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

      const getJumpscareAudioContext = () => {
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextCtor) return null;
        if (!jumpscareAudioCtx) {
          jumpscareAudioCtx = new AudioContextCtor();
        }
        if (jumpscareAudioCtx.state === "suspended") {
          void jumpscareAudioCtx.resume().catch(() => {
          });
        }
        return jumpscareAudioCtx;
      };

      const primeSurvivalAudio = () => {
        if (survivalAudioPrimed) return;
        const ctx = getJumpscareAudioContext();
        if (!ctx) return;
        survivalAudioPrimed = true;

        const now = ctx.currentTime;
        const source = ctx.createBufferSource();
        source.buffer = ctx.createBuffer(1, 1, ctx.sampleRate);
        source.connect(ctx.destination);
        source.start(now);
        source.stop(now + 0.01);
      };

      const updatePowerReadout = () => {
        const cells = Array.from(document.querySelectorAll(".camera-battery-cell"));
        const filled = Math.ceil(clamp(powerLevel, 0, POWER_MAX) / 25);
        const isLow = powerLevel > 0 && powerLevel <= POWER_LOW_THRESHOLD;
        const isCritical = powerLevel > 0 && powerLevel <= POWER_CRITICAL_THRESHOLD;
        cells.forEach((cell, index) => {
          const active = index < filled && powerLevel > 0;
          cell.classList.toggle("is-empty", !active);
          cell.classList.toggle("is-warning", active && isLow);
        });
        const label = document.querySelector(".camera-battery-label");
        if (label) label.textContent = powerLevel <= 0 ? "Power Lost" : "Power";
        body.classList.toggle("power-low", isLow);
        body.classList.toggle("power-critical", isCritical);
        body.classList.toggle("power-depleted", powerLevel <= 0);
        window.__daymoriPowerState = {
          level: Math.round(powerLevel * 10) / 10,
          cells: filled,
          low: isLow,
          critical: isCritical,
          depleted: powerLevel <= 0,
          normalPlayTarget: POWER_NORMAL_PLAY_TARGET_REMAINING,
        };
      };

      const drainPower = (amount) => {
        if (powerLevel <= 0 || nightCleared || gameOverActive) return false;
        powerLevel = clamp(powerLevel - amount, 0, POWER_MAX);
        updatePowerReadout();
        if (powerLevel <= 0) {
          clearMonitorFlash();
          if (typeof window.__daymoriForceCloseTabletForPower === "function") {
            window.__daymoriForceCloseTabletForPower();
          }
        }
        return powerLevel > 0;
      };

      const hasPower = () => powerLevel > 0;

      window.__daymoriHasPower = hasPower;
      window.__daymoriDrainPower = drainPower;

      const canRunNight = () => {
        return !body.classList.contains("main-menu-open") && !body.classList.contains("intro-sequence-open") && !jumpscareActive && !gameOverActive && !nightCompleteActive;
      };

      const formatGameHour = (hourIndex) => {
        if (hourIndex <= 0) return "12 AM";
        return `${hourIndex} AM`;
      };

      const syncNightReadout = () => {
        const progress = clamp(nightElapsedMs / NIGHT_DURATION_MS, 0, 1);
        const hourIndex = Math.min(NIGHT_TOTAL_HOURS, Math.floor(progress * NIGHT_TOTAL_HOURS));
        const hourText = formatGameHour(hourIndex);

        if (nightLabel) nightLabel.textContent = "Night 1";
        if (nightHourLabel) nightHourLabel.textContent = hourText;
        if (nightHudLabel) nightHudLabel.textContent = "Night 1";
        if (nightHudHour) nightHudHour.textContent = hourText;
      };

      const updateNightDebug = () => {
        const progress = clamp(nightElapsedMs / NIGHT_DURATION_MS, 0, 1);
        const hourIndex = Math.min(NIGHT_TOTAL_HOURS, Math.floor(progress * NIGHT_TOTAL_HOURS));
        window.__daymoriFreddyNightState = {
          started: nightStarted,
          cleared: nightCleared,
          elapsedMs: Math.round(nightElapsedMs),
          durationMs: NIGHT_DURATION_MS,
          displayHour: formatGameHour(hourIndex),
          attackCount: nightAttackCount,
          attackTimeline: attackTimeline.slice(),
          nextAttackIndex,
          attackTriggeredCount,
          breachCount,
          doorStage: currentDoorStage,
          flashlightHits: flashlightCurrentHits,
          flashlightRequired: flashlightRequiredHits,
          freddyMonitorRoom: currentFreddyMonitorRoom,
          freddyRoute: activeFreddyRoute ? activeFreddyRoute.key : null,
          freddyRouteStep: activeFreddyRouteStep ? (activeFreddyRouteStep.room || activeFreddyRouteStep.label || "blind-spot") : null,
          freddyRouteStepMs: Math.round(activeFreddyRouteStepMs),
          power: Math.round(powerLevel * 10) / 10,
          nightCompleteActive,
          jumpscareActive,
          gameOver: gameOverActive,
        };
      };

      const setFreddyCameraRoom = (roomKey, options = {}) => {
        currentFreddyMonitorRoom = roomKey || null;
        if (typeof window.__daymoriSetFreddyMonitorRoom === "function") {
          window.__daymoriSetFreddyMonitorRoom(currentFreddyMonitorRoom, options);
        }
        if (options.sound !== false && currentFreddyMonitorRoom) {
          playFreddyMovementCue(currentFreddyMonitorRoom, options);
        }
      };

      const clearFreddyRoute = (options = {}) => {
        activeFreddyRoute = null;
        activeFreddyRouteStepIndex = -1;
        activeFreddyRouteStep = null;
        activeFreddyRouteStepMs = 0;
        setFreddyCameraRoom(options.returnToRoom3 ? "classroom-b" : null, { sound: false });
      };

      const clearStageTimers = () => {
        stopStage2LightFlicker();
        if (stage2Timer) {
          window.clearTimeout(stage2Timer);
          stage2Timer = null;
        }
        if (freddyBlackoutTimer) {
          window.clearTimeout(freddyBlackoutTimer);
          freddyBlackoutTimer = null;
        }
        if (freddyBlackoutHideTimer) {
          window.clearTimeout(freddyBlackoutHideTimer);
          freddyBlackoutHideTimer = null;
        }
        if (freddyBlackoutReleaseTimer) {
          window.clearTimeout(freddyBlackoutReleaseTimer);
          freddyBlackoutReleaseTimer = null;
        }
        doorStageClosing = false;
        doorPresence.classList.remove("stage1-closing");
        doorPresence.classList.remove("stage2-closing");
        body.classList.remove("freddy-blackout-active");
        body.classList.remove("freddy-blackout-release");
      };

      const clearFlashlightTimers = () => {
        if (flashlightPulseTimer) {
          window.clearTimeout(flashlightPulseTimer);
          flashlightPulseTimer = null;
        }
        if (flashlightRecoverTimer) {
          window.clearTimeout(flashlightRecoverTimer);
          flashlightRecoverTimer = null;
        }
        if (flashlightHitTimer) {
          window.clearTimeout(flashlightHitTimer);
          flashlightHitTimer = null;
        }

        if (viewport) {
          viewport.classList.remove("flashlight-active");
          viewport.classList.remove("flashlight-recover");
        }
        doorPresence.classList.remove("flashlight-hit");
      };

      const clearMonitorFlash = () => {
        if (monitorFlashTimer) {
          window.clearTimeout(monitorFlashTimer);
          monitorFlashTimer = null;
        }
        if (cameraFeed) {
          cameraFeed.classList.remove("monitor-flashlight-active");
        }
      };

      const stopStage2LightFlicker = () => {
        if (stage2FlickerTimer) {
          window.clearTimeout(stage2FlickerTimer);
          stage2FlickerTimer = null;
        }
      };

      const playStage2LightFlickerTick = () => {
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextCtor) return;

        if (!stage2AudioCtx) {
          stage2AudioCtx = new AudioContextCtor();
        }
        if (stage2AudioCtx.state === "suspended") {
          void stage2AudioCtx.resume().catch(() => {
          });
        }

        const ctx = stage2AudioCtx;
        const now = ctx.currentTime;
        const duration = randomFloat(0.038, 0.085);
        const master = ctx.createGain();
        const buzz = ctx.createOscillator();
        const buzzGain = ctx.createGain();
        const noise = ctx.createBufferSource();
        const noiseFilter = ctx.createBiquadFilter();
        const noiseGain = ctx.createGain();
        const bufferLength = Math.max(1, Math.floor(ctx.sampleRate * duration));
        const buffer = ctx.createBuffer(1, bufferLength, ctx.sampleRate);
        const data = buffer.getChannelData(0);

        for (let i = 0; i < bufferLength; i += 1) {
          const t = i / bufferLength;
          data[i] = (Math.random() * 2 - 1) * (1 - t);
        }

        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(randomFloat(0.045, 0.095), now + 0.008);
        master.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        master.connect(ctx.destination);

        buzz.type = "sawtooth";
        buzz.frequency.setValueAtTime(randomFloat(46, 62), now);
        buzz.frequency.linearRampToValueAtTime(randomFloat(28, 38), now + duration);
        buzzGain.gain.setValueAtTime(0.08, now);
        buzzGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        buzz.connect(buzzGain).connect(master);

        noise.buffer = buffer;
        noiseFilter.type = "bandpass";
        noiseFilter.frequency.setValueAtTime(randomFloat(2200, 4200), now);
        noiseFilter.Q.value = randomFloat(3.5, 6.8);
        noiseGain.gain.setValueAtTime(0.18, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        noise.connect(noiseFilter).connect(noiseGain).connect(master);

        buzz.start(now);
        noise.start(now);
        buzz.stop(now + duration + 0.01);
        noise.stop(now + duration + 0.01);
      };

      const startStage2LightFlicker = () => {
        stopStage2LightFlicker();

        const tick = () => {
          stage2FlickerTimer = null;
          if (currentDoorStage !== 2 || doorStageClosing || jumpscareActive || gameOverActive) return;
          playStage2LightFlickerTick();
          stage2FlickerTimer = window.setTimeout(tick, randomBetween(180, 760));
        };

        stage2FlickerTimer = window.setTimeout(tick, randomBetween(80, 220));
      };

      const playFreddyJumpscareSound = () => {
        const ctx = getJumpscareAudioContext();
        if (!ctx) return;

        const now = ctx.currentTime;
        const master = ctx.createGain();
        const crush = ctx.createDynamicsCompressor();
        crush.threshold.value = -24;
        crush.knee.value = 4;
        crush.ratio.value = 18;
        crush.attack.value = 0.001;
        crush.release.value = 0.24;
        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(0.98, now + 0.018);
        master.gain.setValueAtTime(0.92, now + 0.32);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 1.42);
        master.connect(crush).connect(ctx.destination);

        const frameCount = Math.floor(ctx.sampleRate * 1.45);
        const buffer = ctx.createBuffer(1, frameCount, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < frameCount; i += 1) {
          const t = i / ctx.sampleRate;
          const envelope = Math.max(0, 1 - (t / 1.42));
          const grit = Math.sin(t * 2 * Math.PI * 92) * 0.34 + Math.sin(t * 2 * Math.PI * 183) * 0.18;
          data[i] = ((Math.random() * 2 - 1) * 0.92 + grit) * envelope;
        }

        const noise = ctx.createBufferSource();
        const noiseFilter = ctx.createBiquadFilter();
        noise.buffer = buffer;
        noiseFilter.type = "bandpass";
        noiseFilter.frequency.setValueAtTime(1850, now);
        noiseFilter.frequency.exponentialRampToValueAtTime(5200, now + 0.18);
        noiseFilter.frequency.exponentialRampToValueAtTime(880, now + 1.36);
        noiseFilter.Q.value = 1.15;
        noise.connect(noiseFilter).connect(master);
        noise.start(now);
        noise.stop(now + 1.45);

        const screamFilter = ctx.createBiquadFilter();
        screamFilter.type = "bandpass";
        screamFilter.frequency.setValueAtTime(3100, now);
        screamFilter.frequency.exponentialRampToValueAtTime(6100, now + 0.22);
        screamFilter.frequency.exponentialRampToValueAtTime(1900, now + 1.28);
        screamFilter.Q.value = 5.8;

        const screamGain = ctx.createGain();
        screamGain.gain.setValueAtTime(0.0001, now);
        screamGain.gain.exponentialRampToValueAtTime(0.46, now + 0.028);
        screamGain.gain.setValueAtTime(0.42, now + 0.48);
        screamGain.gain.exponentialRampToValueAtTime(0.0001, now + 1.38);
        screamFilter.connect(screamGain).connect(master);

        [760, 1180, 1670].forEach((base, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = index === 0 ? "sawtooth" : "square";
          osc.frequency.setValueAtTime(base, now);
          osc.frequency.exponentialRampToValueAtTime(base * 2.85, now + 0.16);
          osc.frequency.exponentialRampToValueAtTime(base * 1.42, now + 0.74);
          osc.frequency.exponentialRampToValueAtTime(base * 0.78, now + 1.34);
          gain.gain.setValueAtTime(0.0001, now);

    (function initFreddyUnevenJitter() {
      const stage2Freddy = document.querySelector(".door-stage2-open .door-stage2-freddy");
      if (!stage2Freddy) return;

      let jitterTimer = null;
      let pulseCount = 0;

      const randomRange = (min, max) => min + Math.random() * (max - min);

      const applyJitter = (el, prefix, maxX, maxY, maxTilt, scaleDelta, baseScale = 1) => {
        if (!el) return;

        const x = randomRange(-maxX, maxX);
        const y = randomRange(-maxY, maxY);
        const tilt = randomRange(-maxTilt, maxTilt);
        const scale = baseScale + randomRange(-scaleDelta, scaleDelta);
        const dur = randomRange(85, 245);

        el.style.setProperty(`--${prefix}-jitter-x`, `${x.toFixed(2)}px`);
        el.style.setProperty(`--${prefix}-jitter-y`, `${y.toFixed(2)}px`);
        el.style.setProperty(`--${prefix}-jitter-tilt`, `${tilt.toFixed(3)}deg`);
        el.style.setProperty(`--${prefix}-jitter-scale`, `${scale.toFixed(4)}`);
        el.style.setProperty(`--${prefix}-jitter-dur`, `${dur.toFixed(0)}ms`);
      };

      const nextDelay = () => {
        const burst = Math.random() < 0.42;
        if (burst) return randomRange(58, 135);
        return randomRange(150, 320);
      };

      const tick = () => {
        pulseCount += 1;
        const boost = pulseCount % 7 === 0 ? 1.42 : 1;

        applyJitter(stage2Freddy, "stage2", 1.06 * boost, 1.42 * boost, 0.44, 0.009, 1.05);

        jitterTimer = window.setTimeout(tick, nextDelay());
      };

      tick();

      window.addEventListener("beforeunload", () => {
        if (jitterTimer) {
          window.clearTimeout(jitterTimer);
          jitterTimer = null;
        }

        stage2Freddy.style.setProperty("--stage2-jitter-y", "0px");
        stage2Freddy.style.setProperty("--stage2-jitter-tilt", "0deg");
        stage2Freddy.style.setProperty("--stage2-jitter-scale", "1");
      });
    })();

          menuScreen.style.display = "none";

      const finishIntroSequence = () => {
        if (!introSequenceRunning) return;
        introSequenceToken += 1;
        introSequenceRunning = false;
        clearIntroTimers();
        if (hasIntroSequence) {
          introLine.classList.remove("is-show", "is-distort", "is-slow", "is-night-card");
          introScreen.classList.remove("is-static-burst", "is-night-transition", "is-night-split-active", "is-night-split-fade");
          introScreen.classList.add("is-hidden");
          clearNightSplitState();
        }
        body.classList.remove("intro-sequence-open");
        enterGameplay();
      };

      const playIntroSequence = async () => {
        if (!hasIntroSequence) {
          enterGameplay();
          return;
        }
        if (introSequenceRunning) return;

        introSequenceRunning = true;
        introSequenceToken += 1;
        const token = introSequenceToken;

        stopMenuMotion();
        body.classList.add("intro-sequence-open");
        introScreen.classList.remove("is-hidden");
        introScreen.classList.remove("is-static-burst", "is-night-transition", "is-night-split-active", "is-night-split-fade");

        introLine.textContent = "";

        for (let i = 0; i < introSequenceLines.length; i += 1) {
          if (token !== introSequenceToken) return;

          const isFinalSlowLine = i >= (introSequenceLines.length - 3);

          introLine.textContent = introSequenceLines[i];

        const now = audioCtx.currentTime;

        filter.connect(gain);

        crayonFilter.frequency.setValueAtTime(980, now);
        crayonFilter.frequency.linearRampToValueAtTime(1320, now + 0.18);
        crayonFilter.Q.value = 1.8;
        crayonGain.gain.setValueAtTime(0.0001, now);
        crayonGain.gain.linearRampToValueAtTime(0.012, now + 0.03);
        crayonGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);
        crayonNoise.connect(crayonFilter).connect(crayonGain).connect(tabletAudioMaster);
        crayonNoise.start(now);
        crayonNoise.stop(now + 0.26);

        if (Math.random() < 0.36) {
          const chairDrag = tabletAudioCtx.createBufferSource();
          const chairFilter = tabletAudioCtx.createBiquadFilter();
          const chairGain = tabletAudioCtx.createGain();
          chairDrag.buffer = createTabletNoiseBuffer(0.2);
          chairFilter.type = "bandpass";
          chairFilter.frequency.setValueAtTime(300, now + 0.05);
          chairFilter.Q.value = 1.7;
          chairGain.gain.setValueAtTime(0.0001, now + 0.045);
          chairGain.gain.linearRampToValueAtTime(0.011, now + 0.08);
          chairGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
          chairDrag.connect(chairFilter).connect(chairGain).connect(tabletAudioMaster);
          chairDrag.start(now + 0.045);
          chairDrag.stop(now + 0.28);
        }
      };

      window.__daymoriPlayRoom6FlashSound = playRoom6FlashSound;
      window.__daymoriPlayRoom7FlashSound = playRoom7FlashSound;

      const playRoom3SwitchSound = () => {
        ensureTabletAudio();
        if (!tabletAudioCtx || !tabletAudioMaster) return;

        const now = tabletAudioCtx.currentTime;
        const metalSettle = tabletAudioCtx.createBufferSource();
        const settleFilter = tabletAudioCtx.createBiquadFilter();
        const settleGain = tabletAudioCtx.createGain();
        metalSettle.buffer = createTabletNoiseBuffer(0.34);
        settleFilter.type = "bandpass";
        settleFilter.frequency.setValueAtTime(520, now + 0.05);
        settleFilter.frequency.linearRampToValueAtTime(290, now + 0.28);
        settleFilter.Q.value = 1.9;
        settleGain.gain.setValueAtTime(0.0001, now + 0.04);
        settleGain.gain.linearRampToValueAtTime(0.014, now + 0.08);
        settleGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.36);
        metalSettle.connect(settleFilter).connect(settleGain).connect(tabletAudioMaster);
        metalSettle.start(now + 0.04);
        metalSettle.stop(now + 0.42);

        if (Math.random() < 0.45) {
          const boxTap = tabletAudioCtx.createOscillator();
          const boxGain = tabletAudioCtx.createGain();
          boxTap.type = "triangle";
          boxTap.frequency.setValueAtTime(168, now + 0.18);
          boxTap.frequency.exponentialRampToValueAtTime(92, now + 0.32);
          boxGain.gain.setValueAtTime(0.0001, now + 0.17);
          boxGain.gain.linearRampToValueAtTime(0.012, now + 0.2);
          boxGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
          boxTap.connect(boxGain).connect(tabletAudioMaster);
          boxTap.start(now + 0.17);
          boxTap.stop(now + 0.44);
        }
      };

      const playRoom3FlashSound = () => {
        ensureTabletAudio();
        if (!tabletAudioCtx || !tabletAudioMaster) return;

        const now = tabletAudioCtx.currentTime;
        const tinyMetal = tabletAudioCtx.createOscillator();
        const metalGain = tabletAudioCtx.createGain();
        tinyMetal.type = "sine";
        tinyMetal.frequency.setValueAtTime(1180, now);
        tinyMetal.frequency.exponentialRampToValueAtTime(640, now + 0.12);
        metalGain.gain.setValueAtTime(0.0001, now);
        metalGain.gain.linearRampToValueAtTime(0.011, now + 0.016);
        metalGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
        tinyMetal.connect(metalGain).connect(tabletAudioMaster);
        tinyMetal.start(now);
        tinyMetal.stop(now + 0.17);

        const dustPaper = tabletAudioCtx.createBufferSource();
        const dustFilter = tabletAudioCtx.createBiquadFilter();
        const dustGain = tabletAudioCtx.createGain();
        dustPaper.buffer = createTabletNoiseBuffer(0.2);
        dustFilter.type = "highpass";
        dustFilter.frequency.setValueAtTime(1550, now + 0.03);
        dustGain.gain.setValueAtTime(0.0001, now + 0.025);
        dustGain.gain.linearRampToValueAtTime(0.009, now + 0.05);
        dustGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
        dustPaper.connect(dustFilter).connect(dustGain).connect(tabletAudioMaster);
        dustPaper.start(now + 0.025);
        dustPaper.stop(now + 0.24);
      };

      window.__daymoriPlayRoom3FlashSound = playRoom3FlashSound;
      window.__daymoriSetFreddyMonitorRoom = setFreddyMonitorRoom;

      const openTablet = () => {
        if (tabletOpen || !canOpenTablet()) return;
        if (closeAnimationTimer) {
          window.clearTimeout(closeAnimationTimer);
          closeAnimationTimer = null;
        }
        tabletOpen = true;
        body.classList.remove("tablet-closing");
        body.classList.add("tablet-open");
        tabletScreen.setAttribute("aria-hidden", "false");
        playTabletFlipSound("open");
        triggerSignalCut();
        if (currentRoom === "room8") {
          startRoom8Observation();
        }
        scheduleFakeSignal();
        scheduleMonitorPhantom();
      };

      const closeTablet = () => {
        if (!tabletOpen) return;
        tabletOpen = false;
        if (closeAnimationTimer) {
          window.clearTimeout(closeAnimationTimer);
          closeAnimationTimer = null;
        }
        stopRoom8Observation();
        stopFakeSignal();
        stopMonitorPhantom();
        playTabletFlipSound("close");
        body.classList.remove("tablet-open");
        body.classList.add("tablet-closing");
        closeAnimationTimer = window.setTimeout(() => {
          body.classList.remove("tablet-closing");
          tabletScreen.setAttribute("aria-hidden", "true");
          closeAnimationTimer = null;
        }, TABLET_CLOSE_ANIMATION_MS);
      };

      window.__daymoriForceCloseTabletForPower = closeTablet;
      window.__daymoriTriggerFakeMonitorSignal = triggerFakeSignal;
      window.__daymoriTriggerMonitorPhantom = triggerMonitorPhantom;

      toggleBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        if (tabletOpen) {
          closeTablet();
        } else {
          openTablet();
        }
      });

      if (closeBtn) {
        closeBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          closeTablet();
        });
      }

      mapButtons.forEach((btn) => {
        btn.addEventListener("click", (event) => {
          event.stopPropagation();
          syncRoom(btn.dataset.room || "classroom-b", { signalCut: true });
        });
      });

      if (pipelineMapToggle) {
        pipelineMapToggle.addEventListener("click", (event) => {
          event.stopPropagation();
          syncMapView(currentMapView === "pipeline" ? "ground" : "pipeline", { signalCut: false });
        });
      }

      window.addEventListener("keydown", (event) => {
        if (!tabletOpen) return;
        if (event.key === "Escape" || event.key === "Tab") {
          event.preventDefault();
          closeTablet();
        }
      });

      window.addEventListener("click", () => {
        if (!canOpenTablet() && tabletOpen) {
          closeTablet();
        }
      });

      window.addEventListener("beforeunload", () => {
        if (signalCutTimer) {
          window.clearTimeout(signalCutTimer);
          signalCutTimer = null;
        }
        if (room4VerdictTimer) {
          window.clearTimeout(room4VerdictTimer);
          room4VerdictTimer = null;
        }
        if (room8IntakeTimer) {
          window.clearTimeout(room8IntakeTimer);
          room8IntakeTimer = null;
        }
        if (room6CollapseTimer) {
          window.clearTimeout(room6CollapseTimer);
          room6CollapseTimer = null;
        }
        if (room4FreddyRevealTimer) {
          window.clearTimeout(room4FreddyRevealTimer);
          room4FreddyRevealTimer = null;
        }
        if (room8FreddyRevealTimer) {
          window.clearTimeout(room8FreddyRevealTimer);
          room8FreddyRevealTimer = null;
        }
        if (room6FreddyRevealTimer) {
          window.clearTimeout(room6FreddyRevealTimer);
          room6FreddyRevealTimer = null;
        }
        if (room7FreddyRevealTimer) {
          window.clearTimeout(room7FreddyRevealTimer);
          room7FreddyRevealTimer = null;
        }
        if (freddyDepartureFlashTimer) {
          window.clearTimeout(freddyDepartureFlashTimer);
          freddyDepartureFlashTimer = null;
        }
        if (fakeSignalTimer) {
          window.clearTimeout(fakeSignalTimer);
          fakeSignalTimer = null;
        }
        if (fakeSignalClearTimer) {
          window.clearTimeout(fakeSignalClearTimer);
          fakeSignalClearTimer = null;
        }
        if (room7PlayTimer) {
          window.clearTimeout(room7PlayTimer);
          room7PlayTimer = null;
        }
        if (room3InventoryTimer) {
          window.clearTimeout(room3InventoryTimer);
          room3InventoryTimer = null;
        }
        stopRoom8Observation();
        if (closeAnimationTimer) {
          window.clearTimeout(closeAnimationTimer);
          closeAnimationTimer = null;
        }
        delete window.__daymoriPlayRoom4FlashSound;
        delete window.__daymoriPlayRoom8FlashSound;
        delete window.__daymoriPlayRoom6FlashSound;
        delete window.__daymoriPlayRoom7FlashSound;
        delete window.__daymoriPlayRoom3FlashSound;
        delete window.__daymoriSetFreddyMonitorRoom;
        delete window.__daymoriForceCloseTabletForPower;
        delete window.__daymoriTriggerFakeMonitorSignal;
        delete window.__daymoriFakeSignalState;
        tabletOpen = false;
        body.classList.remove("tablet-open");
        body.classList.remove("tablet-closing");
        tabletScreen.setAttribute("aria-hidden", "true");
        if (tabletAudioCtx) {
          void tabletAudioCtx.close().catch(() => {
          });
        }
      });

      syncRoom(currentRoom);
      setFreddyMonitorRoom(null, { sound: false });
      syncMapView(currentMapView);
    })();
  </script>
</body>
</html>
