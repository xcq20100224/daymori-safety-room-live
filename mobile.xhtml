<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="zh-CN" lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <title>安全屋场景 Mobile</title>
  <link rel="preload" as="image" href="assets/safety-room-mobile.jpg" />
  <style type="text/css"><![CDATA[
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: #050505;
      color: rgba(248, 250, 250, 0.94);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .main-menu {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      align-items: center;
      padding-left: clamp(34px, 10vw, 112px);
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.94) 0%, rgba(0, 0, 0, 0.78) 32%, rgba(0, 0, 0, 0.25) 100%),
        url("assets/safety-room-mobile.jpg") center center / cover no-repeat,
        #050505;
      overflow: hidden;
      transition: opacity 260ms linear, visibility 260ms linear;
    }

    .main-menu::before,
    .main-menu::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .main-menu::before {
      background: repeating-linear-gradient(to bottom, rgba(255, 255, 255, 0.08) 0 1px, rgba(0, 0, 0, 0) 1px 5px);
      opacity: 0.18;
      mix-blend-mode: screen;
    }

    .main-menu::after {
      background: radial-gradient(ellipse at 72% 46%, rgba(255, 255, 255, 0.12), rgba(0, 0, 0, 0) 36%), radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.72) 78%);
    }

    body:not(.menu-open) .main-menu {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    body.menu-open .hud,
    body.menu-open .tablet-button {
      opacity: 0;
      pointer-events: none;
    }

    body.menu-open .room {
      filter: grayscale(1) contrast(1.12) brightness(0.42) blur(0.7px);
    }

    .menu-panel {
      position: relative;
      z-index: 2;
      width: min(430px, 70vw);
      display: grid;
      gap: clamp(14px, 3vh, 24px);
    }

    .menu-title {
      margin: 0 0 clamp(8px, 2vh, 18px);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(28px, 6vw, 62px);
      line-height: 0.92;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.12), 0 8px 26px rgba(0, 0, 0, 0.9);
    }

    .menu-title span {
      display: block;
    }

    .menu-subtitle {
      margin: -6px 0 clamp(8px, 2vh, 14px);
      color: rgba(248, 250, 250, 0.62);
      font-family: Consolas, "Courier New", monospace;
      font-size: clamp(11px, 2vw, 15px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .menu-button {
      width: min(240px, 48vw);
      min-height: clamp(34px, 6vh, 46px);
      border: 0;
      background: transparent;
      color: rgba(248, 250, 250, 0.9);
      font-family: Consolas, "Courier New", monospace;
      font-size: clamp(18px, 3.6vw, 28px);
      font-weight: 800;
      letter-spacing: 0.05em;
      text-align: left;
      text-shadow: 0 3px 14px rgba(0, 0, 0, 0.92);
    }

    .menu-button::before {
      content: "> ";
      opacity: 0;
    }

    .menu-button:active::before,
    .menu-button:focus-visible::before {
      opacity: 1;
    }

    .menu-footnote {
      margin: clamp(10px, 2vh, 20px) 0 0;
      color: rgba(248, 250, 250, 0.46);
      font-family: Consolas, "Courier New", monospace;
      font-size: clamp(10px, 1.9vw, 13px);
      letter-spacing: 0.12em;
    }

    .stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #000;
    }

    .room {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: 50% 50%;
      filter: grayscale(1) contrast(1.12) brightness(0.86);
      animation: breathe 3.2s ease-in-out infinite;
    }

    .shade,
    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .shade {
      background:
        radial-gradient(ellipse at 50% 48%, rgba(0, 0, 0, 0) 0 48%, rgba(0, 0, 0, 0.34) 100%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.42));
      mix-blend-mode: multiply;
    }

    .grain {
      opacity: 0.16;
      background-image: repeating-linear-gradient(to bottom, rgba(255, 255, 255, 0.08) 0 1px, rgba(0, 0, 0, 0) 1px 4px);
    }

    .hud {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(16px, env(safe-area-inset-right));
      z-index: 10;
      display: grid;
      gap: 2px;
      justify-items: end;
      font-family: Consolas, "Courier New", monospace;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.82);
      pointer-events: none;
    }

    .hud span {
      font-size: clamp(13px, 2.5vw, 18px);
      font-weight: 800;
      letter-spacing: 0.16em;
    }

    .hud strong {
      font-size: clamp(28px, 7vw, 54px);
      line-height: 0.95;
      letter-spacing: 0.06em;
    }

    #tabletSwitch {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .tablet-button {
      position: fixed;
      left: 50%;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 15;
      display: grid;
      place-items: center;
      width: clamp(128px, 24vw, 210px);
      height: clamp(34px, 6.4vh, 48px);
      transform: translateX(-50%);
      border: 1px solid rgba(244, 246, 246, 0.68);
      border-radius: 6px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.17), rgba(255, 255, 255, 0.025) 35%, rgba(0, 0, 0, 0.82) 100%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.06) 0 1px, rgba(0, 0, 0, 0) 1px 7px),
        #050606;
      color: rgba(248, 250, 250, 0.94);
      font-size: clamp(13px, 2.5vw, 18px);
      font-weight: 800;
      letter-spacing: 0.18em;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.64), 0 0 0 1px rgba(0, 0, 0, 0.84) inset;
    }

    .tablet {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      background: rgba(0, 0, 0, 0.96);
    }

    #tabletSwitch:checked ~ .tablet {
      display: block;
    }

    .tablet-panel {
      position: absolute;
      inset: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      border: 1px solid rgba(246, 248, 248, 0.38);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(0, 0, 0, 0.2) 18%, rgba(0, 0, 0, 0.92) 100%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.025) 0 1px, rgba(0, 0, 0, 0) 1px 11px),
        #020303;
      overflow: hidden;
    }

    .tablet-feed {
      position: absolute;
      inset: 48px 12px 12px 12px;
      border: 1px solid rgba(246, 248, 248, 0.36);
      background: #020202 url("assets/safety-room-mobile.jpg") center center / contain no-repeat;
      filter: grayscale(1) contrast(1.18) brightness(0.78);
    }

    .tablet-title {
      position: absolute;
      left: 16px;
      top: 14px;
      z-index: 2;
      margin: 0;
      font-family: Consolas, "Courier New", monospace;
      font-weight: 800;
      letter-spacing: 0.16em;
      font-size: clamp(12px, 2.3vw, 16px);
    }

    .close {
      position: absolute;
      right: 12px;
      top: 10px;
      z-index: 3;
      display: grid;
      place-items: center;
      min-width: 72px;
      height: 32px;
      border: 1px solid rgba(244, 246, 246, 0.6);
      border-radius: 4px;
      background: #080909;
      color: rgba(248, 250, 250, 0.92);
      font-weight: 800;
    }

    .portrait-lock {
      display: none;
    }

    @media (orientation: portrait) {
      .stage,
      .tablet-button,
      .hud,
      .tablet {
        display: none !important;
      }

      .portrait-lock {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: grid;
        place-items: center;
        padding: 28px;
        background: #050505;
        text-align: center;
      }

      .portrait-lock strong {
        display: block;
        font-size: clamp(24px, 8vw, 42px);
        letter-spacing: 0.08em;
      }

      .portrait-lock span {
        display: block;
        margin-top: 14px;
        color: rgba(248, 250, 250, 0.66);
        font-size: clamp(14px, 4vw, 22px);
      }
    }

    @keyframes breathe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.2px); }
    }
  ]]></style>
</head>
<body class="menu-open">
  <main class="stage" aria-label="安全屋横屏场景">
    <img class="room" src="assets/safety-room-mobile.jpg" alt="安全屋场景" />
    <div class="shade" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
  </main>

  <section class="main-menu" aria-label="主界面">
    <div class="menu-panel">
      <h1 class="menu-title"><span>Five Nights</span><span>At Freddy's</span><span>Safe Room</span></h1>
      <p class="menu-subtitle">Night shift mobile build</p>
      <button class="menu-button" type="button" data-start-game="true">NEW GAME</button>
      <button class="menu-button" type="button" data-start-game="true">CONTINUE</button>
      <p class="menu-footnote">Tap to enable audio</p>
    </div>
  </section>

  <div class="hud" aria-label="第一夜时间">
    <span>NIGHT 1</span>
    <strong>12 AM</strong>
  </div>

  <input id="tabletSwitch" type="checkbox" />
  <label class="tablet-button" for="tabletSwitch">TABLET</label>

  <section class="tablet" aria-label="平板监控">
    <div class="tablet-panel">
      <p class="tablet-title">CAM 09 SAFE ROOM</p>
      <label class="close" for="tabletSwitch">CLOSE</label>
      <div class="tablet-feed" aria-hidden="true"></div>
    </div>
  </section>

  <div class="portrait-lock" aria-hidden="true">
    <div>
      <strong>请横屏打开</strong>
      <span>旋转手机或平板后继续</span>
    </div>
  </div>
  <script type="text/javascript"><![CDATA[
    var startButtons = document.querySelectorAll("[data-start-game]");
    var tabletSwitch = document.getElementById("tabletSwitch");
    var audioContext = null;
    var masterGain = null;
    var ambientStarted = false;

    function ensureAudio() {
      var AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;
      if (!audioContext) {
        audioContext = new AudioContextClass();
        masterGain = audioContext.createGain();
        masterGain.gain.value = 0.18;
        masterGain.connect(audioContext.destination);
      }
      if (audioContext.state === "suspended") audioContext.resume();
      if (!ambientStarted) startAmbient();
    }

    function createNoiseBuffer() {
      var sampleRate = audioContext.sampleRate;
      var buffer = audioContext.createBuffer(1, sampleRate * 2, sampleRate);
      var data = buffer.getChannelData(0);
      for (var index = 0; index < data.length; index += 1) {
        data[index] = (Math.random() * 2 - 1) * 0.18;
      }
      return buffer;
    }

    function startAmbient() {
      if (!audioContext || !masterGain) return;
      ambientStarted = true;
      var hum = audioContext.createOscillator();
      var humGain = audioContext.createGain();
      hum.type = "sine";
      hum.frequency.value = 58;
      humGain.gain.value = 0.26;
      hum.connect(humGain).connect(masterGain);
      hum.start();

      var noise = audioContext.createBufferSource();
      var noiseFilter = audioContext.createBiquadFilter();
      var noiseGain = audioContext.createGain();
      noise.buffer = createNoiseBuffer();
      noise.loop = true;
      noiseFilter.type = "bandpass";
      noiseFilter.frequency.value = 780;
      noiseFilter.Q.value = 0.62;
      noiseGain.gain.value = 0.055;
      noise.connect(noiseFilter).connect(noiseGain).connect(masterGain);
      noise.start();
    }

    function playClick() {
      if (!audioContext || !masterGain) return;
      var now = audioContext.currentTime;
      var osc = audioContext.createOscillator();
      var gain = audioContext.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(62, now + 0.12);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.22, now + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
      osc.connect(gain).connect(masterGain);
      osc.start(now);
      osc.stop(now + 0.18);
    }

    function startGame() {
      ensureAudio();
      playClick();
      document.body.classList.remove("menu-open");
    }

    for (var i = 0; i < startButtons.length; i += 1) {
      startButtons[i].addEventListener("click", startGame);
    }

    if (tabletSwitch) {
      tabletSwitch.addEventListener("change", function () {
        ensureAudio();
        playClick();
      });
    }
  ]]></script>
</body>
</html>
